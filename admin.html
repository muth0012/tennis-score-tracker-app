<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Tracker — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .match-card { transition: opacity 0.2s ease, transform 0.2s ease; }
    .match-card.removing { opacity: 0; transform: scale(0.97); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mono { font-family: 'ui-monospace', monospace; }
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-4 min-h-screen">

<div class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="mb-6 p-4 bg-white shadow-lg rounded-xl border border-gray-200 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-indigo-700">Match Admin</h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Tennis Tracker</p>
        </div>
        <a href="index.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded-lg px-3 py-2">← Back to Scorer</a>
    </div>

    <div class="flex justify-end mb-4">
        <a href="timeline.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded-lg px-3 py-2 bg-indigo-50">📋 View Match Timeline</a>
    </div>

    <!-- Summary -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white shadow-md rounded-xl border border-gray-200 p-4 text-center">
            <div id="active-count" class="text-3xl font-bold text-amber-500">—</div>
            <div class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold mt-1">Active Matches</div>
        </div>
        <div class="bg-white shadow-md rounded-xl border border-gray-200 p-4 text-center">
            <div id="ended-count" class="text-3xl font-bold text-emerald-500">—</div>
            <div class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold mt-1">Ended Matches</div>
        </div>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-4">
        <button data-filter="PLAYING" class="filter-btn flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wide bg-indigo-600 text-white">Active</button>
        <button data-filter="ENDED" class="filter-btn flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wide bg-white text-gray-600 border border-gray-200">Ended</button>
        <button data-filter="ALL" class="filter-btn flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wide bg-white text-gray-600 border border-gray-200">All</button>
    </div>

    <!-- Bulk action -->
    <div id="bulk-bar" class="hidden mb-4 flex justify-end">
        <button id="btn-end-all" class="text-xs font-semibold text-red-600 hover:text-red-800 border border-red-200 bg-red-50 rounded-lg px-3 py-2">End all active matches</button>
    </div>

    <div id="loading" class="text-center py-16 text-indigo-400 font-semibold text-sm uppercase tracking-widest">⏳ Connecting…</div>
    <div id="empty-state" class="hidden text-center py-16 text-gray-400 text-sm">No matches in this view.</div>
    <div id="match-list" class="space-y-3"></div>

</div>

<script>
    const config = {
        apiKey: "AIzaSyBOdTC5Q8MmbDhlNGlpm-EFQgJFZebIUZI",
        authDomain: "tennis-score-tracker-bd317.firebaseapp.com",
        projectId: "tennis-score-tracker-bd317",
        storageBucket: "tennis-score-tracker-bd317.firebasestorage.app",
        messagingSenderId: "301275539476",
        appId: "1:301275539476:web:6ae1032d7d23f7c699df01"
    };

    let db, appId;
    let allMatches = [];      // cached full set from the live listener
    let currentFilter = 'PLAYING';
    let tickInterval = null;

    function fmtStart(ts) {
        if (!ts) return '—';
        return new Date(ts).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function fmtDuration(startTs, endTs) {
        const end = endTs || Date.now();
        if (!startTs) return '0:00';
        const s = Math.floor((end - startTs) / 1000);
        const m = Math.floor(s / 60), h = Math.floor(m / 60);
        return `${h > 0 ? h + ':' : ''}${String(m % 60).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }

    function scoreSummary(m) {
        const sw = m.setsWon || [0, 0];
        return `Sets ${sw[0]}–${sw[1]}`;
    }

    function render() {
        const list = document.getElementById('match-list');
        const filtered = currentFilter === 'ALL' ? allMatches : allMatches.filter(m => m.status === currentFilter);

        document.getElementById('active-count').textContent = allMatches.filter(m => m.status === 'PLAYING').length;
        document.getElementById('ended-count').textContent = allMatches.filter(m => m.status === 'ENDED').length;
        document.getElementById('bulk-bar').classList.toggle('hidden', currentFilter !== 'PLAYING' || filtered.length === 0);

        document.getElementById('empty-state').classList.toggle('hidden', filtered.length !== 0);
        list.innerHTML = filtered.map(m => {
            const isActive = m.status === 'PLAYING';
            return `
            <div class="match-card bg-white shadow-md rounded-xl border border-gray-200 p-4" data-id="${m.id}">
                <div class="flex items-start justify-between">
                    <div>
                        <div class="font-bold text-gray-800">${m.p1 || 'Player 1'} <span class="text-gray-400 font-normal">vs</span> ${m.p2 || 'Player 2'}</div>
                        <div class="text-xs text-gray-500 mt-0.5">${m.loc ? m.loc + ' · ' : ''}${scoreSummary(m)}</div>
                        <div class="text-[10px] text-gray-400 mt-1 mono">ID: ${m.id} · Started ${fmtStart(m.start)}</div>
                    </div>
                    <div class="text-right">
                        <span class="inline-block text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-full ${isActive ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}">${m.status}</span>
                        <div class="text-xs font-semibold mono mt-1 ${isActive ? 'text-indigo-600' : 'text-gray-500'}" data-duration="${m.id}">${fmtDuration(m.start, m.end)}</div>
                    </div>
                </div>
                <div class="flex gap-2 mt-3 pt-3 border-t border-gray-100">
                    ${isActive ? `<button class="btn-end flex-1 text-xs font-semibold bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-lg py-2" data-id="${m.id}">End Match</button>` : ''}
                    <a href="timeline.html?matchId=${m.id}" class="flex-1 text-center text-xs font-semibold bg-gray-50 text-gray-600 hover:bg-gray-100 rounded-lg py-2">Timeline</a>
                    <a href="index.html?matchId=${m.id}&mode=spectate" target="_blank" class="flex-1 text-center text-xs font-semibold bg-gray-50 text-gray-600 hover:bg-gray-100 rounded-lg py-2">View</a>
                    <button class="btn-delete text-xs font-semibold bg-red-50 text-red-600 hover:bg-red-100 rounded-lg py-2 px-3" data-id="${m.id}">Delete</button>
                </div>
            </div>`;
        }).join('');
    }

    async function endMatch(id) {
        await db.collection(`artifacts/${appId}/public/data/matches`).doc(id).update({
            status: 'ENDED',
            end: Date.now()
        });
    }

    async function deleteMatch(id) {
        await db.collection(`artifacts/${appId}/public/data/matches`).doc(id).delete();
    }

    document.getElementById('match-list').addEventListener('click', async (e) => {
        const endBtn = e.target.closest('.btn-end');
        const delBtn = e.target.closest('.btn-delete');
        if (endBtn) {
            const id = endBtn.dataset.id;
            endBtn.disabled = true;
            endBtn.textContent = 'Ending…';
            try { await endMatch(id); } catch (err) { alert('Failed to end match: ' + err.message); endBtn.disabled = false; endBtn.textContent = 'End Match'; }
        }
        if (delBtn) {
            const id = delBtn.dataset.id;
            if (!confirm(`Permanently delete match ${id}? This cannot be undone.`)) return;
            const card = delBtn.closest('.match-card');
            card.classList.add('removing');
            try { await deleteMatch(id); } catch (err) { alert('Failed to delete match: ' + err.message); card.classList.remove('removing'); }
        }
    });

    document.getElementById('btn-end-all').addEventListener('click', async () => {
        const active = allMatches.filter(m => m.status === 'PLAYING');
        if (active.length === 0) return;
        if (!confirm(`End all ${active.length} active match(es)? This cannot be undone.`)) return;
        const btn = document.getElementById('btn-end-all');
        btn.disabled = true;
        btn.textContent = 'Ending all…';
        try {
            await Promise.all(active.map(m => endMatch(m.id)));
        } catch (err) {
            alert('Some matches failed to end: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'End all active matches';
        }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('bg-indigo-600', b === btn);
                b.classList.toggle('text-white', b === btn);
                b.classList.toggle('bg-white', b !== btn);
                b.classList.toggle('text-gray-600', b !== btn);
                b.classList.toggle('border', b !== btn);
                b.classList.toggle('border-gray-200', b !== btn);
            });
            render();
        });
    });

    // Live-tick the duration display on active matches without a full re-render
    tickInterval = setInterval(() => {
        allMatches.filter(m => m.status === 'PLAYING').forEach(m => {
            const el = document.querySelector(`[data-duration="${m.id}"]`);
            if (el) el.textContent = fmtDuration(m.start, m.end);
        });
    }, 1000);

    window.addEventListener('load', () => {
        firebase.initializeApp(config);
        db = firebase.firestore();
        const auth = firebase.auth();
        appId = config.projectId;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { await auth.signInAnonymously(); return; }

            db.collection(`artifacts/${appId}/public/data/matches`)
              .orderBy('start', 'desc')
              .onSnapshot(snap => {
                  allMatches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                  document.getElementById('loading').classList.add('hidden');
                  render();
              }, err => {
                  document.getElementById('loading').textContent = '⚠️ Connection error: ' + err.message;
              });
        });
    });
</script>
</body>
</html>
