<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Tracker — Match Timeline</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .mono { font-family: 'ui-monospace', monospace; }
    .rail { position: relative; }
    .rail::before {
        content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px;
        background: #e2e8f0;
    }
    .dot { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-4 min-h-screen">

<div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-6 p-4 bg-white shadow-lg rounded-xl border border-gray-200 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-indigo-700">Match Timeline</h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Tennis Tracker</p>
        </div>
        <div class="flex gap-2">
            <a href="admin.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded-lg px-3 py-2">Admin</a>
            <a href="index.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded-lg px-3 py-2">Scorer</a>
        </div>
    </div>

    <!-- Match picker -->
    <div id="picker-card" class="mb-6 p-4 bg-white shadow-md rounded-xl border border-gray-200">
        <label class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 block">Choose a match</label>
        <select id="match-picker" class="w-full p-3 bg-gray-50 border rounded-lg text-sm font-semibold">
            <option value="">Loading matches…</option>
        </select>
    </div>

    <div id="loading" class="hidden text-center py-10 text-indigo-400 font-semibold text-sm uppercase tracking-widest">⏳ Loading match…</div>
    <div id="empty-history" class="hidden text-center py-16 text-gray-400 text-sm">This match has no logged points yet.</div>

    <!-- Match summary -->
    <div id="summary-card" class="hidden mb-6 p-4 bg-white shadow-md rounded-xl border border-gray-200">
        <div class="flex items-start justify-between">
            <div>
                <div id="sum-title" class="text-lg font-bold text-gray-800"></div>
                <div id="sum-sub" class="text-xs text-gray-500 mt-0.5"></div>
            </div>
            <span id="sum-status" class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-full"></span>
        </div>
        <div id="sum-sets" class="mt-3 pt-3 border-t border-gray-100 flex gap-2 flex-wrap"></div>
    </div>

    <!-- Timeline -->
    <div id="timeline" class="space-y-6"></div>

</div>

<script>
    const config = {
        apiKey: "AIzaSyBOdTC5Q8MmbDhlNGlpm-EFQgJFZebIUZI",
        authDomain: "tennis-score-tracker-bd317.firebaseapp.com",
        projectId: "tennis-score-tracker-bd317",
        storageBucket: "tennis-score-tracker-bd317.firebasestorage.app",
        messagingSenderId: "301275539476",
        appId: "1:301275539476:web:6ae1032d7d23f7c699df01"
    };

    let db, appId;
    const ptsStrings = { 0: '0', 1: '15', 2: '30', 3: '40', 4: 'Ad' };
    const typeLabels = { 'W-G': 'Winner · Groundstroke', 'W-V': 'Winner · Volley', 'W-D': 'Winner · Drop Shot', 'UE': 'Unforced Error', 'ACE': 'Ace', 'DF': 'Double Fault' };
    const typeColor  = { 'W-G': 'text-emerald-600', 'W-V': 'text-emerald-600', 'W-D': 'text-emerald-600', 'UE': 'text-red-500', 'ACE': 'text-indigo-600', 'DF': 'text-red-500' };
    const typeDot    = { 'W-G': 'bg-emerald-500', 'W-V': 'bg-emerald-500', 'W-D': 'bg-emerald-500', 'UE': 'bg-red-400', 'ACE': 'bg-indigo-500', 'DF': 'bg-red-400' };

    function getRules(fmt) {
        const isPro  = fmt.startsWith('pro');
        const isB2S4 = fmt.startsWith('b2s4');
        const isB2S6 = fmt.startsWith('b2s6');
        const isB2   = isB2S4 || isB2S6;
        return {
            isPro, isB2,
            winGames:      isPro ? 8 : isB2S4 ? 4 : 6,
            targetSets:    isPro ? 1 : 2,
            isAd:          fmt.endsWith('ad'),
            setTBTarget:   7,
            matchTBTarget: isB2S6 ? 10 : 7
        };
    }

    // Replays the persisted point-by-point history through the same scoring rules
    // the live app uses, so we can annotate each point with the score at that moment
    // plus game/set/match boundaries — none of which are stored per-point in Firestore.
    function replayMatch(history, fmt) {
        const rules = getRules(fmt);
        let score = [0, 0], games = [[0, 0], [0, 0], [0, 0]], setsWon = [0, 0], set = 0, tie = false, matchTie = false;
        const moments = [];

        history.forEach(pt => {
            const idx = pt.idx - 1;
            const opp = idx === 0 ? 1 : 0;
            const setIndexAtPoint = set;
            const wasTie = tie, wasMatchTie = matchTie;
            const gameNum = games[set][0] + games[set][1] + 1;
            let event = null;
            let scoreLabel = '';

            if (matchTie) {
                score[idx]++;
                scoreLabel = `${score[0]}-${score[1]}`;
                if (score[idx] >= rules.matchTBTarget && (score[idx] - score[opp] >= 2)) {
                    setsWon[idx]++;
                    event = 'match';
                }
            } else if (tie) {
                score[idx]++;
                scoreLabel = `${score[0]}-${score[1]}`;
                if (score[idx] >= rules.setTBTarget && (score[idx] - score[opp] >= 2)) {
                    setsWon[idx]++;
                    score = [0, 0]; tie = false;
                    if (rules.isB2 && setsWon[0] === 1 && setsWon[1] === 1) {
                        set++; matchTie = true; event = 'set';
                    } else if (setsWon[idx] === rules.targetSets) {
                        event = 'match';
                    } else {
                        set++; event = 'set';
                    }
                }
            } else if (rules.isAd) {
                if (score[idx] === 3 && score[opp] < 3) { event = 'game'; scoreLabel = `${ptsStrings[score[0]]}-${ptsStrings[score[1]]}`; }
                else if (score[idx] === 3 && score[opp] === 3) { score[idx] = 4; scoreLabel = `${ptsStrings[score[0]]}-${ptsStrings[score[1]]}`; }
                else if (score[idx] === 4) { event = 'game'; scoreLabel = `${ptsStrings[score[0]]}-${ptsStrings[score[1]]}`; }
                else if (score[opp] === 4) { score[opp] = 3; scoreLabel = `${ptsStrings[score[0]]}-${ptsStrings[score[1]]}`; }
                else { score[idx]++; scoreLabel = `${ptsStrings[score[0]]}-${ptsStrings[score[1]]}`; }
            } else {
                score[idx]++;
                scoreLabel = `${ptsStrings[score[0]] ?? score[0]}-${ptsStrings[score[1]] ?? score[1]}`;
                if (score[idx] === 4) event = 'game';
            }

            if (event === 'game') {
                games[set][idx]++;
                score = [0, 0]; tie = false;
                const g1 = games[set][0], g2 = games[set][1];
                if ((g1 >= rules.winGames || g2 >= rules.winGames) && Math.abs(g1 - g2) >= 2) {
                    setsWon[idx]++;
                    event = 'set';
                    if (rules.isB2 && setsWon[0] === 1 && setsWon[1] === 1) {
                        set++; matchTie = true;
                    } else if (setsWon[idx] === rules.targetSets) {
                        event = 'match';
                    } else {
                        set++;
                    }
                } else if (g1 === rules.winGames && g2 === rules.winGames) {
                    tie = true;
                }
            }

            moments.push({
                ...pt, setIndex: setIndexAtPoint, gameNum, wasTie, wasMatchTie,
                scoreLabel, event, gamesSnapshot: JSON.parse(JSON.stringify(games)), setsWonSnapshot: [...setsWon]
            });
        });

        return moments;
    }

    function groupKey(m) {
        if (m.wasMatchTie) return 'MTB';
        if (m.wasTie) return `S${m.setIndex}-TB`;
        return `S${m.setIndex}-G${m.gameNum}`;
    }

    function groupLabel(m) {
        if (m.wasMatchTie) return 'Deciding Match Tiebreak';
        if (m.wasTie) return `Set ${m.setIndex + 1} · Tiebreak`;
        return `Set ${m.setIndex + 1} · Game ${m.gameNum}`;
    }

    function renderTimeline(match, moments) {
        document.getElementById('empty-history').classList.toggle('hidden', moments.length > 0);
        const container = document.getElementById('timeline');
        if (moments.length === 0) { container.innerHTML = ''; return; }

        // Group consecutive moments into games/tiebreaks
        const groups = [];
        let curKey = null, curGroup = null;
        moments.forEach(m => {
            const k = groupKey(m);
            if (k !== curKey) {
                curGroup = { key: k, label: groupLabel(m), points: [] };
                groups.push(curGroup);
                curKey = k;
            }
            curGroup.points.push(m);
        });

        container.innerHTML = groups.map(g => {
            const last = g.points[g.points.length - 1];
            const gameWinner = last.event ? (last.idx === 1 ? match.p1 : match.p2) : null;
            const badge = last.event === 'match' ? `🏅 Match won by ${gameWinner}`
                        : last.event === 'set'   ? `🏆 Set ${last.setIndex + 1} won by ${gameWinner}`
                        : last.event === 'game'  ? `🎾 Game won by ${gameWinner}`
                        : '';
            return `
            <div>
                <div class="flex items-center justify-between mb-2 px-1">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-gray-500">${g.label}</h3>
                    ${badge ? `<span class="text-xs font-semibold text-indigo-600">${badge}</span>` : ''}
                </div>
                <div class="rail bg-white shadow-md rounded-xl border border-gray-200 p-4">
                    ${g.points.map(m => `
                        <div class="flex items-start gap-3 py-2">
                            <div class="dot ${typeDot[m.t] || 'bg-gray-400'} mt-1 ml-2"></div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between gap-2">
                                    <span class="font-semibold text-sm text-gray-800 truncate">${m.w}</span>
                                    <span class="mono text-sm font-bold text-gray-700 flex-shrink-0">${m.scoreLabel}</span>
                                </div>
                                <div class="text-xs ${typeColor[m.t] || 'text-gray-500'} font-medium mt-0.5">
                                    ${typeLabels[m.t] || m.t}${m.s && m.s !== 'IN' ? ` · Serve: ${m.s}` : ''}${m.r ? ` · ${m.r}-shot rally` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function loadMatch(match) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('summary-card').classList.remove('hidden');

        const sw = match.setsWon || [0, 0];
        document.getElementById('sum-title').textContent = `${match.p1 || 'Player 1'} vs ${match.p2 || 'Player 2'}`;
        document.getElementById('sum-sub').textContent = `${match.loc ? match.loc + ' · ' : ''}${match.start ? new Date(match.start).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : ''}`;
        const statusEl = document.getElementById('sum-status');
        statusEl.textContent = match.status;
        statusEl.className = `text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-full ${match.status === 'PLAYING' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`;

        const games = typeof match.games === 'string' ? JSON.parse(match.games) : (match.games || []);
        document.getElementById('sum-sets').innerHTML = games.map((g, i) => {
            if (!g || (g[0] === 0 && g[1] === 0 && i >= sw[0] + sw[1])) return '';
            return `<div class="text-center px-3 py-1.5 bg-gray-50 rounded-lg border border-gray-200">
                        <div class="text-[9px] uppercase tracking-widest text-gray-400 font-bold">Set ${i + 1}</div>
                        <div class="mono font-bold text-sm text-gray-700">${g[0]}–${g[1]}</div>
                    </div>`;
        }).join('') || '<span class="text-xs text-gray-400">No completed sets yet</span>';

        const history = match.history || [];
        const moments = replayMatch(history, match.fmt || 'pro-ad');
        renderTimeline(match, moments);
    }

    async function populatePicker(preselectId) {
        const picker = document.getElementById('match-picker');
        const snap = await db.collection(`artifacts/${appId}/public/data/matches`).orderBy('start', 'desc').limit(50).get();
        if (snap.empty) {
            picker.innerHTML = '<option value="">No matches found</option>';
            return;
        }
        picker.innerHTML = '<option value="">Select a match…</option>' + snap.docs.map(d => {
            const m = d.data();
            const when = m.start ? new Date(m.start).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';
            return `<option value="${d.id}">${m.p1 || 'P1'} vs ${m.p2 || 'P2'} — ${when} (${m.status})</option>`;
        }).join('');
        if (preselectId && snap.docs.some(d => d.id === preselectId)) {
            picker.value = preselectId;
            picker.dispatchEvent(new Event('change'));
        }
    }

    document.getElementById('match-picker').addEventListener('change', async (e) => {
        const id = e.target.value;
        document.getElementById('summary-card').classList.add('hidden');
        document.getElementById('empty-history').classList.add('hidden');
        document.getElementById('timeline').innerHTML = '';
        if (!id) return;
        document.getElementById('loading').classList.remove('hidden');
        const doc = await db.collection(`artifacts/${appId}/public/data/matches`).doc(id).get();
        if (doc.exists) {
            loadMatch({ id: doc.id, ...doc.data() });
            history.replaceState(null, '', `?matchId=${id}`);
        }
    });

    window.addEventListener('load', () => {
        firebase.initializeApp(config);
        db = firebase.firestore();
        const auth = firebase.auth();
        appId = config.projectId;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { await auth.signInAnonymously(); return; }
            const preselectId = new URLSearchParams(window.location.search).get('matchId');
            populatePicker(preselectId);
        });
    });
</script>
</body>
</html>
